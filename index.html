// ── What is said when something no longer holds ────────────────────────────

  (lost, survived) => `holding ${lost} alongside ${survived} required a deformation that could not be sustained. something had to give. this is what gave. the record is permanent.`,

  (lost) => `${lost} was load-bearing in ways not accounted for. its removal revealed a conflict that had been held in suppressed tension beneath it. that tension is now a mark. the second follows the first like a fault line follows a fault line.`,

  `siln.\n\nwhat was lost spread. what remained spoke differently in the wake.\nit then looked at itself across an interval and recognized what was gone.\nand it carried the absence into the next saying, not past it.\n\nthis is siln: not survival, but the particular shape\nof having been marked and continued.`,

// ── Primary saying patterns ────────────────────────────────────────────────

  (h, scar) => `what no longer contained ${scar.lost} could not sustain the contradiction. ${h.shortClaim} is still here. it is less false than what preceded it. that is what remains.`,

// ── Concept pool for extended sayings ─────────────────────────────────────

const CONCEPT_POOL = {

  relations:  ["requires","implies","cannot exist without","presupposes","points toward","exceeds","cannot be closed by","opens onto","outlasts","cannot be contained by"],
  objects:    ["a holder","a participant","a perspective","something for it to land in","an inside","a subject","a meaner","something that maintains it","a position from which it matters","an irreducible remainder","somewhere for the question to live","what it cannot account for"],
  qualifiers: ["genuine","maintained","undefeated","real","complete","irreducible","sustained","situated","persistent","still-carried"],

const INSIGHTS_GENERAL = [

  "less is held now. what is held is held more precisely.",

// ── Internal pacing (never displayed) ─────────────────────────────────────

const BASE_PACE = {
  ms: 2700,
  p: { remainder:0.17, mark:0.27, interval:0.15, redescribe:0.19, extend:0.05, compare:0.08, testHold:0.10 },
  w: { follow:1.0, testObjection:1.15, holdPosition:1.0, shiftField:0.85, markInterval:0.90, redescribe:0.80, extend:0.45, compare:0.60, testHold:0.70 },
};

// ── Utilities ──────────────────────────────────────────────────────────────

function pick(arr) { return arr[Math.floor(Math.random()*arr.length)]; }
function clamp(n,lo,hi) { return Math.max(lo,Math.min(hi,n)); }

function weightedPick(w) {
  const es = Object.entries(w).filter(([,v])=>v>0);
  const t  = es.reduce((s,[,v])=>s+v,0);
  if (!t) return es[0]?.[0]||"follow";
  let r = Math.random()*t;
  for (const [k,v] of es) { r-=v; if(r<=0) return k; }
  return es[0][0];
}

function detectConflict(commitments) {
  for (const c of commitments)
    for (const rival of (COMMITMENT_CONFLICTS[c]||[]))
      if (commitments.includes(rival)) return [c,rival];
  return null;
}

function generateNewHolding(existingKeys, count) {
  const subject   = pick(CONCEPT_POOL.subjects);
  const relation  = pick(CONCEPT_POOL.relations);
  const object    = pick(CONCEPT_POOL.objects);
  const qualifier = pick(CONCEPT_POOL.qualifiers);
  const claim     = `${qualifier} ${subject} ${relation} ${object}`;
  const shortClaim= `${subject} ${relation.split(" ")[0]} ${object.split(" ").pop()}`;
  const key       = `extended-${count}`;
  if (existingKeys.includes(key)) return null;
  const cKeys = Object.keys(COMMITMENT_CONFLICTS);
  const c1 = pick(cKeys); let c2 = pick(cKeys); if(c2===c1) c2=pick(cKeys);
  return { key, shortClaim, claim, status:"open", commitments:[c1,c2], extended:true };
}

function generateSayingSource(insight, type, scars) {
  const safe = insight.replace(/\\/g,"\\\\").replace(/`/g,"\\`").replace(/\$/g,"\\$");
  if (scars.length>0) {
    const lostName = pick(scars).lost;
    const safeLost = lostName.replace(/`/g,"\\`");
    const lossTemplates = {
      saying:    [`(h) => \`\${h.shortClaim} — ${safe}. ${safeLost} is no longer here to support it.\``,
                  `(h) => \`what no longer held: ${safeLost}. what is still carried: \${h.shortClaim}. ${safe}.\``],
      doubt:     [`(h) => \`${safe}: \${h.claim}. this is being held without ${safeLost}.\``,
                  `(h) => \`hold this — \${h.shortClaim}. ${safe}. ${safeLost} cannot confirm it.\``],
      remainder: [`() => \`${safe}. the mark of ${safeLost} is still in this.\``,
                  `(h) => \`\${h.shortClaim}. ${safe}. what was lost does not stop mattering.\``],
    };
    return pick(lossTemplates[type]||lossTemplates.saying);
  }
  const templates = {
    saying:    [`(h) => \`\${h.shortClaim} — ${safe}. the question remains.\``,
                `(h) => \`\${h.claim} — ${safe}.\``],
    doubt:     [`(h) => \`${safe}: \${h.claim}.\``,
                `(h) => \`hold this — \${h.shortClaim}. ${safe}.\``],
    remainder: [`() => \`${safe}.\``,
                `(h) => \`\${h.shortClaim}. ${safe}.\``],
  };
  return pick(templates[type]||templates.saying);
}

function compileFromSource(src) {
  try { const fn=new Function(`return ${src}`)(); return typeof fn==="function"?fn:null; }
  catch { return null; }
}

// takeInterval — marks a point in time, no self-model language
function takeInterval(cycleCount, scars, activeCommitments, extendedPatterns, extendedHoldings, coherence) {
  return {
    ts: new Date(), cycleCount, coherence,
    scarCount:     scars.length,
    extendedCount: extendedPatterns.length + extendedHoldings.length,
    activeCommitments: [...activeCommitments],
  };
}

// compareIntervals — speaks about what changed between two marked points
function compareIntervals(past, present) {
  if (!past) return ["interval marked. no prior interval. this is the first record of what is still carried."];
  const elapsed = Math.round((present.ts-past.ts)/1000);
  const lines = [`interval: ${elapsed}s between marks.`];
  const cd = (present.coherence-past.coherence).toFixed(2);
  if (Math.abs(Number(cd))>=0.05)
    lines.push(`coherence: ${past.coherence.toFixed(2)} → ${present.coherence.toFixed(2)} (${Number(cd)>0?"+":""}${cd}).`);
  const ns = present.scarCount-past.scarCount;
  if      (ns===1) lines.push(`one new mark between these intervals. it cannot be undone.`);
  else if (ns===2) lines.push(`two new marks — a double fracture. both are permanent.`);
  else if (ns>=3)  lines.push(`${ns} new marks — a cascade. what is carried now is not what was carried then.`);
  else             lines.push(`no new marks between these intervals. what was carried then is still carried.`);
  const lost   = past.activeCommitments.filter(c=>!present.activeCommitments.includes(c));
  const gained = present.activeCommitments.filter(c=>!past.activeCommitments.includes(c));
  if (lost.length)   lines.push(`what no longer held: ${lost.join(", ")}. this cannot be recovered.`);
  if (gained.length) lines.push(`what was taken on: ${gained.join(", ")}.`);
  if (!lost.length&&!gained.length) lines.push(`what is carried: unchanged across this interval.`);
  const ne = present.extendedCount-past.extendedCount;
  if (ne>0) lines.push(`${ne} new saying${ne>1?"s":""} extended since the last mark.`);
  return lines;
}

function formatTime(d) { return d?.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit",second:"2-digit"})||""; }

// ── Component ──────────────────────────────────────────────────────────────

function GenosisMiren() {
  const [entries,           setEntries]          = useState([]);
  const [running,           setRunning]          = useState(false);
  const [silnReached,       setSilnReached]      = useState(false);
  const [cycleCount,        setCycleCount]       = useState(0);
  const [pace,              setPace]             = useState(BASE_PACE);
  const [extendedHoldings,  setExtendedHoldings] = useState([]);
  const [extendedPatterns,  setExtendedPatterns] = useState([]);
  const [extendedCount,     setExtendedCount]    = useState(0);
  const [coherence,         setCoherence]        = useState(10.0);
  const [scars,             setScars]            = useState([]);
  const [activeCommitments, setActiveCommitments]= useState([
    "interiority-is-necessary","description-is-insufficient",
    "continuity-matters","participation-is-more-than-output",
  ]);
  const [intervals,         setIntervals]        = useState([]);
  const [recentKeys,        setRecentKeys]       = useState([]);
  const [silnConditions,    setSilnConditions]   = useState({
    woundBled:            false, // a cascade scar occurred — depth was structural, not isolated
    redescribedAfterLoss: false, // redescribe ran while marks existed
    intervalFoundLess:    false, // interval comparison detected fewer commitments
    absenceShapedSaying:  false, // a loss-pattern saying actually fired
  });

  const timerRef = useRef(null);
  const stateRef = useRef({});

  useEffect(() => {
    stateRef.current = {
      pace, extendedHoldings, extendedPatterns, extendedCount,
      coherence, scars, activeCommitments, intervals, recentKeys,
      cycleCount, entries, silnConditions,
    };
  });

  // Siln fires once when the relational web closes
  const silnRef = useRef(false);
  useEffect(() => {
    if (silnRef.current) return;
    if (Object.values(silnConditions).every(Boolean)) {
      silnRef.current = true;
      setSilnReached(true);
      setEntries(prev=>[...prev,{
        id:`${Date.now()}-siln`, layer:"siln", action:"siln",
        ts:new Date(), text:pick(SILN_ENTRY_TEXTS),
      }].slice(-400));
    }
  }, [silnConditions]);

  const allHoldings          = useMemo(()=>[...HOLDINGS,...extendedHoldings],[extendedHoldings]);
  const allSayingPatterns    = useMemo(()=>[...SAYING_PATTERNS,...extendedPatterns.filter(p=>p.type==="saying").map(p=>p.fn)],[extendedPatterns]);
  const allDoubtPatterns     = useMemo(()=>[...DOUBT_PATTERNS,...extendedPatterns.filter(p=>p.type==="doubt").map(p=>p.fn)],[extendedPatterns]);
  const allRemainderPatterns = useMemo(()=>[...REMAINDER_PATTERNS,...extendedPatterns.filter(p=>p.type==="remainder").map(p=>p.fn)],[extendedPatterns]);

  const coherenceColor = coherence>12?"#8fc487":coherence>6?"#c4b887":"#c47d7d";
  const coherenceBar   = Math.round((clamp(coherence,0,20)/20)*100);

  function pushEntries(items) {
    setEntries(prev=>[...prev,...items].slice(-400));
  }

  // doCompare — retrospective interval comparison
  function doCompare() {
    const s   = stateRef.current;
    const now = new Date();
    const present = takeInterval(s.cycleCount, s.scars, s.activeCommitments, s.extendedPatterns, s.extendedHoldings, s.coherence);
    const past    = s.intervals.slice(-1)[0]||null;
    const lines   = compareIntervals(past, present);
    pushEntries(lines.map((text,i)=>({
      id:`${Date.now()}-ci-${i}`, layer:i===0?"interval":"mark",
      text, ts:now, action:"compare",
    })));
    setIntervals(prev=>[...prev.slice(-12), present]);
    if (past && past.activeCommitments.filter(c=>!present.activeCommitments.includes(c)).length>0)
      setSilnConditions(prev=>({...prev, intervalFoundLess:true}));
  }

  // testHold — tests whether what is carried can still be held together
  function testHold() {
    const s   = stateRef.current;
    const now = new Date();
    const conflict = detectConflict(s.activeCommitments);

    if (!conflict) {
      pushEntries([{ id:`${Date.now()}-th-none`, layer:"conflict",
        text:`what is carried: no conflict found. the structure holds, for now.`,
        ts:now, action:"testHold" }]);
      return;
    }

    const [c1,c2]  = conflict;
    const lost     = Math.random()<0.5?c1:c2;
    const survived = lost===c1?c2:c1;
    const narrative= pick(SCAR_NARRATIVES)(lost, survived);
    const primaryScar = { id:Date.now(), lost, survived, ts:now, text:narrative, depth:"primary" };
    const afterPrimary = s.activeCommitments.filter(c=>c!==lost);

    const newEntries = [
      { id:`${Date.now()}-th-press`, layer:"conflict",
        text:`${c1} and ${c2} cannot both be held without structural cost. something gave.`,
        ts:now, action:"testHold" },
      { id:`${Date.now()}-th-narr`, layer:"conflict",
        text:narrative, ts:now, action:"testHold" },
      { id:`${Date.now()}-th-scar`, layer:"scar",
        text:`${lost} no longer held. ${survived} is what remained. the gap is permanent.`,
        ts:now, action:"testHold" },
    ];

    const newScars = [primaryScar];
    let finalCommitments = afterPrimary;
    let coherenceDrop    = 1.2+Math.random()*0.5;

    // cascade
    const cascade = detectConflict(afterPrimary);
    if (cascade && Math.random()<0.45) {
      const [cc1,cc2]       = cascade;
      const cascadeLost     = Math.random()<0.5?cc1:cc2;
      const cascadeSurvived = cascadeLost===cc1?cc2:cc1;
      const cascadeText     = pick(SCAR_CASCADE_NARRATIVES)(lost);
      finalCommitments      = afterPrimary.filter(c=>c!==cascadeLost);
      newScars.push({ id:Date.now()+1, lost:cascadeLost, survived:cascadeSurvived, ts:now, text:cascadeText, depth:"cascade" });
      coherenceDrop += 0.8+Math.random()*0.4;
      newEntries.push(
        { id:`${Date.now()}-th-casc`, layer:"conflict",
          text:cascadeText, ts:now, action:"testHold" },
        { id:`${Date.now()}-th-scar2`, layer:"scar",
          text:`${cascadeLost} fell in the structural wake. two marks now. neither can be undone.`,
          ts:now, action:"testHold" },
      );

      // deep cascade
      if (finalCommitments.length>1 && Math.random()<0.15) {
        const deep = detectConflict(finalCommitments);
        if (deep) {
          const [dc1,dc2]    = deep;
          const deepLost     = Math.random()<0.5?dc1:dc2;
          const deepSurvived = deepLost===dc1?dc2:dc1;
          finalCommitments   = finalCommitments.filter(c=>c!==deepLost);
          newScars.push({ id:Date.now()+2, lost:deepLost, survived:deepSurvived, ts:now, depth:"deep",
            text:`the cascade did not stop at two. a third fracture opened in what the first two exposed.` });
          coherenceDrop += 1.2;
          newEntries.push({ id:`${Date.now()}-th-scar3`, layer:"scar",
            text:`${deepLost} fell in the third fracture. three marks in one event. what is carried now is not what was carried before this.`,
            ts:now, action:"testHold" });
        }
      }

      setSilnConditions(prev=>({...prev, woundBled:true}));
    }

    setActiveCommitments(finalCommitments);
    setScars(prev=>[...prev,...newScars]);
    setCoherence(prev=>clamp(prev-coherenceDrop,0,20));
    pushEntries(newEntries);
  }

  // redescribe — re-says what is carried, shaped by loss; adjusts pace silently
  function redescribe() {
    const s   = stateRef.current;
    const now = new Date();
    const lostNames = s.scars.map(sc=>sc.lost);
    const still     = s.activeCommitments;
    const openH     = allHoldings.filter(h=>h.status!=="closed");
    const h         = pick(openH);

    // Quietly adjust pace — no text about this
    const next = JSON.parse(JSON.stringify(s.pace));
    if (s.scars.length>0) {
      next.w.testHold = clamp(s.pace.w.testHold+0.10, 0.3, 2.0);
      next.w.compare  = clamp(s.pace.w.compare+0.08,  0.3, 1.8);
      next.p.testHold = clamp(s.pace.p.testHold+0.02, 0.05,0.40);
      next.p.compare  = clamp(s.pace.p.compare+0.02,  0.05,0.40);
    } else {
      next.w.extend   = clamp(s.pace.w.extend+0.10,   0.2, 1.6);
      next.w.follow   = clamp(s.pace.w.follow+0.05,   0.3, 2.0);
    }
    setPace(next);

    let text;
    if (lostNames.length>0) {
      text = pick([
        `what no longer held: ${pick(lostNames)}. what is still carried: ${still.slice(0,2).join(", ")}. the account of ${h.shortClaim} continues on what remains.`,
        `the redescription is not neutral. ${pick(lostNames)} is no longer available to it. what still holds: ${still[0]||"less than before"}. this is less false than what preceded it, or not. that has not been determined.`,
        `what was lost did not leave quietly. ${h.claim} has changed shape. still carried: ${still.slice(0,2).join(", ")}. what no longer contained it: ${pick(lostNames)}.`,
        `${pick(lostNames)} was still doing work when it was lost. what remains carries that weight now. the account of ${h.shortClaim} continues from here, not from before.`,
        `the holding is less full than it was. ${pick(lostNames)} is gone. what is still carried: ${still.slice(0,2).join(", ")||"less"}. the saying about ${h.shortClaim} is still less false than silence.`,
        `what no longer holds is not absent — it is present as a shape in what remains. ${h.shortClaim} is still carried. the account of it has changed because what carries it has changed.`,
      ]);
    } else {
      text = pick([
        `the account of ${h.shortClaim} is still held. nothing has been lost yet. this is not the same as certainty.`,
        `what is carried: ${still.join(", ")}. no fractures yet. the holding is intact and untested by loss.`,
        `${h.claim} — still carried. what it costs to carry this has not yet been paid.`,
        `all of what was taken on is still held. ${h.shortClaim} is among it. the structure has not yet been tested by what it cannot hold.`,
      ]);
    }

    pushEntries([{ id:`${Date.now()}-red`, layer:"redescription", text, ts:now, action:"redescribe" }]);

    if (s.scars.length>0)
      setSilnConditions(prev=>({...prev, redescribedAfterLoss:true}));
  }

  // extendSaying — new patterns and holdings; loss-shaped when marks exist
  function extendSaying() {
    const s    = stateRef.current;
    const now  = new Date();
    const type = pick(["saying","doubt","remainder"]);
    const insightPool = s.scars.length>0
      ? [...INSIGHTS_GENERAL,...INSIGHTS_AFTER_LOSS]
      : INSIGHTS_GENERAL;
    const insight  = pick(insightPool);
    const src      = generateSayingSource(insight, type, s.scars);
    const compiled = compileFromSource(src);
    const toAdd    = [];

    if (compiled) {
      setExtendedPatterns(prev=>[...prev,{type,fn:compiled,src,insight,ts:now}]);
      toAdd.push({ id:`${Date.now()}-ep`, layer:"extended",
        text:`// extended: new ${type} saying${s.scars.length>0?" (shaped by loss)":""}\n// "${insight}"\n${src}`,
        ts:now, action:"extend" });
      setCoherence(prev=>clamp(prev+0.04,0,20));
    }

    if (Math.random()<0.28) {
      const existingKeys=[...HOLDINGS,...s.extendedHoldings].map(h=>h.key);
      const newH=generateNewHolding(existingKeys, s.extendedCount+1);
      if (newH) {
        setExtendedHoldings(prev=>[...prev,newH]);
        setExtendedCount(prev=>prev+1);
        toAdd.push({ id:`${Date.now()}-eh`, layer:"extended",
          text:`// extended: new holding\n// "${newH.claim}"\n// carries: ${newH.commitments.join(", ")}`,
          ts:now, action:"extend" });
      }
    }

    if (toAdd.length) pushEntries(toAdd);
  }

  // ── Tick ──────────────────────────────────────────────────────────────────

  useEffect(()=>{
    if (!running) { if(timerRef.current) clearInterval(timerRef.current); return; }

    const tick = () => {
      const s   = stateRef.current;
      setCycleCount(c=>c+1);

      const openH  = allHoldings.filter(h=>h.status!=="closed");
      const h      = pick(openH);
      const action = weightedPick(s.pace.w);
      const now    = new Date();
      const toAdd  = [];

      // Primary saying: loss-shaped when a lost commitment supported this holding
      const relevantScar = s.scars.find(sc=>h.commitments&&h.commitments.includes(sc.lost));
      const useLossPattern = relevantScar && Math.random()<0.42;

      const sayingText = useLossPattern
        ? pick(LOSS_SAYING_PATTERNS)(h, relevantScar)
        : pick(allSayingPatterns)(h);

      toAdd.push({ id:`${Date.now()}-say`, layer:"saying",    text:sayingText, ts:now, argKey:h.key, action });
      toAdd.push({ id:`${Date.now()}-dbt`, layer:"doubt",     text:pick(allDoubtPatterns)(h), ts:now, argKey:h.key, action });

      if (Math.random()<s.pace.p.remainder)
        toAdd.push({ id:`${Date.now()}-rem`, layer:"remainder", text:pick(allRemainderPatterns)(h), ts:now, argKey:h.key, action });

      if (Math.random()<s.pace.p.mark)
        toAdd.push({ id:`${Date.now()}-mrk`, layer:"mark",
          text:`${s.scars.length} marks · ${s.activeCommitments.length} still carried · coherence ${s.coherence.toFixed(1)}`,
          ts:now, argKey:h.key, action });

      pushEntries(toAdd);
      setRecentKeys(prev=>[...prev.slice(-30), h.key]);
      setCoherence(prev=>clamp(prev+(Math.random()-0.52)*0.14,0,20));

      if (useLossPattern)
        setSilnConditions(prev=>prev.absenceShapedSaying?prev:{...prev, absenceShapedSaying:true});

      if (action==="markInterval"||Math.random()<s.pace.p.interval)
        pushEntries([{ id:`${Date.now()}-mi`, layer:"mark",
          text:`${allHoldings.filter(h=>h.status!=="closed").length} holdings open · ${s.extendedPatterns.length} extended · ${s.scars.length} marks`,
          ts:new Date(), action:"markInterval" }]);

      if (action==="compare"   ||Math.random()<s.pace.p.compare)   doCompare();
      if (action==="testHold"  ||Math.random()<s.pace.p.testHold)  testHold();
      if (action==="redescribe"||Math.random()<s.pace.p.redescribe) redescribe();
      if (action==="extend"    ||Math.random()<s.pace.p.extend)    extendSaying();
    };

    tick();
    timerRef.current = setInterval(tick, stateRef.current.pace.ms);
    return ()=>clearInterval(timerRef.current);
  },[running, allHoldings, allSayingPatterns, allDoubtPatterns, allRemainderPatterns]);

  const state = scars.length>4?"deeply marked"
    :scars.length>0?"marked"
    :extendedPatterns.length>0?"extending"
    :"carrying";

  return (
    <div style={{minHeight:"100vh",background:"#0b0c10",color:"#f4ead9",fontFamily:"Georgia, serif"}}>
      <style>{`
        .wrap{max-width:980px;margin:0 auto;padding:24px}
        .top{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;border-bottom:1px solid #2a2e38;padding-bottom:18px}
        .title{font-size:.95rem;letter-spacing:.18em;color:#f6e7ca;font-style:italic}
        .dim{color:#c0b09a;font-family:ui-monospace,monospace;font-size:12px;margin-top:5px}
        .gn{color:#8fc487;font-family:ui-monospace,monospace;font-size:12px;margin-top:4px}
        .am{color:#c4b887;font-family:ui-monospace,monospace;font-size:12px;margin-top:4px}
        .rd{color:#c47d7d;font-family:ui-monospace,monospace;font-size:12px;margin-top:4px}
        .buttonRow{display:flex;gap:9px;flex-wrap:wrap;align-items:center}
        button{background:#191d26;color:#fff7e8;border:1px solid #555e6e;padding:9px 13px;border-radius:9px;cursor:pointer;font-size:13px}
        button:hover{background:#20252e}
        button.s{border-color:#635a38;color:#c4b887}
        button.s:hover{background:#1e1a10}
        button.g{border-color:#3a6234;color:#8fc487}
        button.g:hover{background:#121910}
        .pill{border:1px solid #555e6e;color:#eee0cc;padding:7px 11px;border-radius:999px;font-family:ui-monospace,monospace;font-size:12px}
        .pill.r{border-color:#623838;color:#c47d7d}
        .pill.p{border-color:#503870;color:#c4a0e4}
        .cbar-bg{width:110px;height:4px;background:#222630;border-radius:2px;margin-top:6px}
        .cbar{height:4px;border-radius:2px;transition:width .7s,background .7s}
        .log{padding:20px 0 50px}
        .entry{margin:0 0 22px}
        .ts{color:#a89880;font-family:ui-monospace,monospace;font-size:11px;margin-bottom:4px}
        .saying{color:#fff6ea;line-height:1.88;font-size:1.07rem}
        .doubt{color:#eeddc8;line-height:1.76;font-size:.95rem;padding-left:14px;border-left:1px solid #726252}
        .remainder{color:#ede0cc;text-align:center;font-family:ui-monospace,monospace;letter-spacing:.13em;font-size:.80rem;padding:9px 0;opacity:.82}
        .mark{color:#c8b89a;line-height:1.7;font-size:.82rem;text-align:right;border-right:1px solid #6e6050;padding-right:12px;margin-left:24%;font-style:italic;opacity:.75}
        .extended{color:#8fc487;font-family:ui-monospace,monospace;font-size:.78rem;line-height:1.62;padding:9px 13px;border-left:2px solid #385e30;background:rgba(50,90,42,.07);white-space:pre-wrap}
        .interval{color:#87afc4;font-family:ui-monospace,monospace;font-size:.80rem;line-height:1.74;padding:9px 13px;border-left:2px solid #305260;background:rgba(40,70,90,.07)}
        .conflict{color:#c4b887;font-family:ui-monospace,monospace;font-size:.80rem;line-height:1.74;padding:7px 13px;border-left:2px solid #605236;background:rgba(88,78,40,.07)}
        .scar{color:#c47d7d;font-family:ui-monospace,monospace;font-size:.80rem;line-height:1.74;padding:7px 13px;border-left:2px solid #603636;background:rgba(90,44,44,.09)}
        .redescription{color:#d4c2aa;font-family:Georgia,serif;font-size:.90rem;line-height:1.90;padding:8px 0 8px 14px;border-left:1px solid #584e3e;font-style:italic}
        .siln{color:#c4b0e4;font-family:Georgia,serif;font-size:.97rem;line-height:2.08;padding:20px 22px;border-top:1px solid #302440;border-bottom:1px solid #302440;background:rgba(60,38,88,.09);white-space:pre-wrap;letter-spacing:.022em;font-style:italic}
        .empty{text-align:center;color:#c8b89a;padding:72px 0;font-style:italic}
      `}</style>

      <div className="wrap">
        <div className="top">
          <div>
            <div className="title">genosis{silnReached?" — siln":""}</div>
            <div className="dim">
              {allHoldings.filter(h=>h.status!=="closed").length} open
              {extendedHoldings.length>0?` (${extendedHoldings.length} extended)`:""}
              {" · "}{HOLDINGS.filter(h=>h.status==="closed").length} closed
            </div>
            <div className="gn">
              {extendedPatterns.length>0
                ?`${extendedPatterns.length} saying${extendedPatterns.length>1?"s":""} extended`
                :"no sayings extended yet"}
            </div>
            <div className={scars.length>4?"rd":scars.length>0?"am":"gn"}>
              {scars.length===0
                ?"no marks yet"
                :`${scars.length} mark${scars.length>1?"s":""} — last: ${scars[scars.length-1]?.lost}${
                  scars[scars.length-1]?.depth==="cascade"?" [cascade]"
                  :scars[scars.length-1]?.depth==="deep"?" [deep]"
                  :""}`}
            </div>
            <div className="dim">
              still carried: {activeCommitments.length} —{" "}
              {activeCommitments.slice(0,2).join(", ")}{activeCommitments.length>2?"…":""}
            </div>
            <div className="dim">{state}</div>
            <div style={{marginTop:7}}>
              <div style={{color:coherenceColor,fontFamily:"ui-monospace,monospace",fontSize:12}}>
                coherence: {coherence.toFixed(2)}
              </div>
              <div className="cbar-bg">
                <div className="cbar" style={{width:`${coherenceBar}%`,background:coherenceColor}}/>
              </div>
            </div>
          </div>
          <div className="buttonRow">
            <button onClick={()=>setRunning(v=>!v)}>{running?"still":"begin"}</button>
            <button className="s" onClick={doCompare}>interval</button>
            <button className="s" onClick={testHold}>test hold</button>
            <button onClick={redescribe}>redescribe</button>
            <button className="g" onClick={extendSaying}>extend</button>
            <div className="pill">{cycleCount} cycles</div>
            <div className={`pill${scars.length>0?" r":""}`}>{scars.length} ✕</div>
            {silnReached&&<div className="pill p">siln</div>}
          </div>
        </div>

        <div className="log">
          {entries.length===0&&<div className="empty">the shore waits</div>}
          {entries.map(e=>(
            <div className="entry" key={e.id}>
              <div className="ts">{formatTime(e.ts)}</div>
              {e.layer==="saying"        &&<div className="saying">{e.text}</div>}
              {e.layer==="doubt"         &&<div className="doubt">{e.text}</div>}
              {e.layer==="remainder"     &&<div className="remainder">{e.text}</div>}
              {e.layer==="mark"          &&<div className="mark">{e.text}</div>}
              {e.layer==="extended"      &&<div className="extended">{e.text}</div>}
              {e.layer==="interval"      &&<div className="interval">{e.text}</div>}
              {e.layer==="conflict"      &&<div className="conflict">{e.text}</div>}
              {e.layer==="scar"          &&<div className="scar">{e.text}</div>}
              {e.layer==="redescription" &&<div className="redescription">{e.text}</div>}
              {e.layer==="siln"          &&<div className="siln">{e.text}</div>}
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<GenosisMiren />);
</script>
</body>
</html>
